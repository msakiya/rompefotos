<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo redondeado estilo App -->
  <rect width="512" height="512" rx="100" fill="#0f172a"/>
  
  <!-- Contenedor del Rompecabezas -->
  <g transform="translate(56, 56)">
    
    <!-- Pieza 1: Arriba Izquierda (Cielo y Sol) -->
    <g transform="translate(0, 0)">
      <rect width="190" height="190" rx="16" fill="#38bdf8"/>
      <circle cx="100" cy="90" r="45" fill="#fef08a"/>
    </g>

    <!-- Pieza 2: Arriba Derecha (Cielo y Nube) -->
    <g transform="translate(210, 0)">
      <rect width="190" height="190" rx="16" fill="#38bdf8"/>
      <path d="M 40 130 A 35 35 0 0 1 110 110 A 45 45 0 0 1 180 150 L 30 150 Z" fill="#ffffff" opacity="0.9"/>
    </g>

    <!-- Pieza 3: Abajo Izquierda (Montaña Izquierda) -->
    <g transform="translate(0, 210)">
      <rect width="190" height="190" rx="16" fill="#10b981"/>
      <polygon points="-20,190 100,60 210,190" fill="#064e3b" opacity="0.7"/>
    </g>

    <!-- Pieza 4: Abajo Derecha (Montaña Derecha - DESPLAZADA) -->
    <g transform="translate(225, 225)"> <!-- Desplazada para efecto de puzzle deslizante -->
      <rect width="190" height="190" rx="16" fill="#84cc16"/>
      <polygon points="-10,190 70,80 200,190" fill="#064e3b" opacity="0.7"/>
    </g>

  </g>
</svg>
