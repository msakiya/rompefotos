<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juego de rompecabezas con tus propias fotos - Login</title>
    <meta name="description" content="Un divertido juego de rompecabezas deslizante. Sube tus fotos y juega armándolas en niveles de dificultad 4x4, 5x5 y 6x6. Guarda tu progreso y compite.">
    <meta name="keywords" content="rompecabezas, puzzle, fotos, juego, HTML5, pwa">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/assets/icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container glass-panel">
        <h1 class="gradient-text" style="line-height: 1.1;">Rompe<br>Fotos</h1>
        <p class="subtitle">Guarda y juega con tus fotos</p>
        
        <div class="tabs">
            <button class="tab-btn active" data-target="login">Ingresar</button>
            <button class="tab-btn" data-target="register">Crear Cuenta</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active-form">
            <div class="input-group">
                <label for="login-email">Correo Electrónico</label>
                <input type="email" id="login-email" required placeholder="tu@correo.com">
            </div>
            <div class="input-group">
                <label for="login-password">Contraseña</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
            <div id="login-error" class="error-message"></div>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form">
            <div class="input-group">
                <label for="register-email">Correo Electrónico</label>
                <input type="email" id="register-email" required placeholder="tu@correo.com">
            </div>
            <div class="input-group">
                <label for="register-password">Contraseña</label>
                <input type="password" id="register-password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-secondary w-100">Registrarse</button>
            <div id="register-error" class="error-message"></div>
        </form>
    </div>
    
    <footer style="text-align: center; margin-top: 2rem; padding-bottom: 2rem; color: var(--text-muted); font-size: 0.9rem;">
        Creado por <a href="https://comunidadcpe.com" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 600;">Comunidadcpe</a>
    </footer>

    <script src="js/api.js?v=2"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
    <script src="js/auth.js?v=3"></script>
</body>
</html>
